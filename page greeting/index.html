<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DOM Practice</title>
</head>
<body>

    <h1 id="mainHeading">Hello</h1>
    <p id="para">This is a paragraph.</p>

    <p id="info">This is a normal text.</p>

    <p class="note">Note 1</p>
    <p class="note">Note 2</p>

    <div id="container">
        <p>This is the original paragraph.</p>
    </div>

    <img id="myImage" src="image2.jpg" alt="Old Image" width="200">

    <h1 id="main-heading">Welcome to DOM</h1>

    <p class="description">Learning DOM is fun!</p>

    <button>Click me</button>
    <button>Don't click me</button>

    <div>
        <span style="display:none">This is a span inside a div</span>
    </div>

    <script src="script.js"></script>

</body>
</html>
